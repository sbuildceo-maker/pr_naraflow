<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — NARA BID</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-blue-400 text-5xl font-black mb-2">N</div>
      <h1 class="text-white text-2xl font-bold">NARA BID</h1>
      <p class="text-slate-400 text-sm mt-1">나라장터 영업 관리 시스템</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-5 text-sm">
        ❌ {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">이메일</label>
          <input type="email" name="email" required autocomplete="email"
                 class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                 placeholder="name@company.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">비밀번호</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                 placeholder="••••••••">
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors text-sm mt-2">
          로그인
        </button>
      </form>
    </div>
  </div>
</body>
</html>
