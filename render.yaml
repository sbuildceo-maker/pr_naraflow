services:
  - type: web
    name: nara-bid-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: NARA_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
